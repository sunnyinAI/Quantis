<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="ktitle kdesc">
  <title id="ktitle">Kharcha app icon</title>
  <desc id="kdesc">Teal chalkboard with Devanagari letter Kha in white chalk</desc>

  <defs>
    <!-- Chalk roughness filter -->
    <filter id="chalk" x="-8%" y="-8%" width="116%" height="116%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" seed="5" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.2"
        xChannelSelector="R" yChannelSelector="G" result="rough"/>
      <feComposite in="rough" in2="SourceGraphic" operator="in"/>
    </filter>

    <!-- Board surface gradient — deep teal like dark chalkboard -->
    <linearGradient id="board" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%"   stop-color="#0C3547"/>
      <stop offset="100%" stop-color="#071E2B"/>
    </linearGradient>

    <!-- Teal-blue frame gradient (Facebook-weight confidence) -->
    <linearGradient id="frame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0E7490"/>
      <stop offset="100%" stop-color="#0369A1"/>
    </linearGradient>

    <!-- Chalk smudge mask for the letter -->
    <filter id="chalkletter" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="5" seed="12" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="2.8"
        xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- Outer teal-blue frame (like a wooden chalkboard surround) -->
  <rect width="128" height="128" rx="24" fill="url(#frame)"/>

  <!-- Subtle inner bevel highlight -->
  <rect x="2" y="2" width="124" height="124" rx="22.5"
    fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.2"/>

  <!-- Chalkboard surface -->
  <rect x="7" y="7" width="114" height="114" rx="17" fill="url(#board)"/>

  <!-- Board inner rim chalk line -->
  <rect x="10" y="10" width="108" height="108" rx="14.5"
    fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="1"/>

  <!-- Chalk dust specks at bottom edge -->
  <circle cx="22"  cy="112" r="1.1" fill="rgba(255,255,255,0.40)"/>
  <circle cx="27"  cy="114" r="0.7" fill="rgba(255,255,255,0.28)"/>
  <circle cx="33"  cy="113" r="0.9" fill="rgba(255,255,255,0.32)"/>
  <circle cx="39"  cy="115" r="0.5" fill="rgba(255,255,255,0.22)"/>
  <circle cx="90"  cy="113" r="0.8" fill="rgba(255,255,255,0.30)"/>
  <circle cx="97"  cy="114" r="0.6" fill="rgba(255,255,255,0.25)"/>
  <circle cx="104" cy="112" r="1.0" fill="rgba(255,255,255,0.35)"/>

  <!-- Chalk smear line (like someone wiped the board) -->
  <line x1="14" y1="109" x2="50" y2="109"
    stroke="rgba(255,255,255,0.07)" stroke-width="2.5" stroke-linecap="round"
    filter="url(#chalk)"/>

  <!-- Main Devanagari letter ख  in chalk white -->
  <text
    x="64" y="90"
    text-anchor="middle"
    font-family="'Noto Sans Devanagari', 'Mangal', 'Sanskrit Text', serif"
    font-size="74"
    font-weight="700"
    fill="rgba(240, 248, 255, 0.90)"
    filter="url(#chalkletter)"
  >ख</text>

  <!-- Faint teal shine on frame top-left corner -->
  <ellipse cx="22" cy="18" rx="18" ry="8"
    fill="rgba(255,255,255,0.06)" transform="rotate(-30 22 18)"/>
</svg>
