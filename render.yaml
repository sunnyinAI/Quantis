databases:
  - name: kharcha-db
    plan: free
    databaseName: kharcha
    user: kharcha

services:
  - type: web
    name: kharcha
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npm ci --prefix client && npm run build --prefix client
    startCommand: node apps/server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20.20.0"
      - key: DEV_OTP_VISIBLE
        value: "true"
      - key: SESSION_EXPIRY_DAYS
        value: "30"
      - key: DATABASE_URL
        fromDatabase:
          name: kharcha-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
