databases:
  - name: kharcha-db
    plan: free
    databaseName: kharcha
    user: kharcha

services:
  - type: web
    name: kharcha-api
    runtime: node
    plan: free
    rootDir: apps/server
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DEV_OTP_VISIBLE
        value: "true"
      - key: SESSION_EXPIRY_DAYS
        value: "30"
      - key: DATABASE_URL
        fromDatabase:
          name: kharcha-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
